<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="brand.css" />
<style>
  html,body{ margin:0; padding:0; background:#fff; }
  #stage{ position:relative; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"></div>
<script type="text/babel" src="nb-shared.jsx"></script>
<script type="text/babel" src="nb-identity.jsx"></script>
<script type="text/babel" src="nb-applications.jsx"></script>
<script type="text/babel">
  const SIZES = {
    banner:  { w: 1584, h: 396,  C: () => <Banner /> },
    profile: { w: 560,  h: 560,  C: () => <ProfilePic /> },
    quote:   { w: 1080, h: 1080, C: () => <QuotePost /> },
    deck:    { w: 1280, h: 720,  C: () => <DeckCover /> },
    cardf:   { w: 1050, h: 600,  C: () => <CardFront /> },
    cardb:   { w: 1050, h: 600,  C: () => <CardBack /> },
  };
  let root = ReactDOM.createRoot(document.getElementById('stage'));
  window.renderScaled = function(name, dispW){
    const s = SIZES[name];
    const scale = dispW / s.w;
    const stage = document.getElementById('stage');
    stage.style.width = s.w + 'px';
    stage.style.height = s.h + 'px';
    stage.style.transformOrigin = 'top left';
    stage.style.transform = 'scale(' + scale + ')';
    document.body.style.width = Math.round(s.w*scale) + 'px';
    document.body.style.height = Math.round(s.h*scale) + 'px';
    root.render(<s.C />);
    return { w: Math.round(s.w*scale), h: Math.round(s.h*scale) };
  };
  // default
  window.renderScaled('quote', 540);
</script>
</body>
</html>
